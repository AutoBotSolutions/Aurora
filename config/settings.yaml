application:
  name: "god_platform"
  version: "1.0.0"
  environment: "production" # Options: development, testing, production

logging:
  level: "INFO" # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/app.log"
  max_file_size: 10MB
  backup_count: 5

database:
  host: "localhost"
  port: 5432
  name: "god_db"
  user: "db_user"
  password: "secure_password"

api:
  host: "0.0.0.0"
  port: 8080
  timeout: 30
  enable_https: true

monitoring:
  enable: true
  frequency: "5m" # Monitoring frequency: 5m, 10m, etc.

security:
  enable_encryption: true
  encryption_key: "my_secret_key"
  jwt_secret: "jwt_secret_string"
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
    - "mydomain.com"

features:
  enable_ml_pipeline: true
  auto_model_retraining: false
  enable_real_time_monitoring: true

performance:
  max_threads: 8
  timeout: 300 # seconds
  memory_limit: "2GB"

dependencies:
  python_version: ">=3.8"
  external_libraries:
    - "numpy"
    - "pandas"
    - "scikit-learn"
    - "tensorflow"
    - "flask"